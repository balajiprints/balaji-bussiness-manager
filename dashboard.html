<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balaji Business Manager Dashboard</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <div class="top-bar">
    <h1>Balaji Business Manager</h1>
    <p>Business Dashboard</p>
  </div>

  <div class="cards">

    <div class="card">
      <h3>💰 Today Income</h3>
      <h2 id="todayIncome">₹0</h2>
    </div>

    <div class="card">
      <h3>💸 Today Expense</h3>
      <h2 id="todayExpense">₹0</h2>
    </div>

    <div class="card">
      <h3>📈 Today Profit</h3>
      <h2 id="todayProfit">₹0</h2>
    </div>

    <div class="card">
      <h3>🏦 Total Accounts</h3>
      <h2 id="totalAccounts">₹0</h2>
    </div>

    <div class="card">
      <h3>🆔 Total IDs Balance</h3>
      <h2 id="totalIds">₹0</h2>
    </div>

    <div class="card">
      <h3>💵 Total Cash</h3>
      <h2 id="totalCash">₹0</h2>
    </div>

    <div class="card">
      <h3>📱 Total UPI</h3>
      <h2 id="totalUpi">₹0</h2>
    </div>

    <div class="card">
      <h3>🤝 Total Udhaar</h3>
      <h2 id="totalUdhaar">₹0</h2>
    </div>

    <div class="card">
      <h3>💎 Business Worth</h3>
      <h2 id="businessWorth">₹0</h2>
    </div>

  </div>

  <div class="menu">

    <button onclick="location.href='income.html'">
  Income
</button>

<button onclick="location.href='expense.html'">
  Expense
</button>

<button onclick="location.href='accounts.html'">
  Accounts
</button>

<button onclick="location.href='ids.html'">
  IDs
</button>

<button onclick="location.href='cash.html'">
  Cash
</button>

<button onclick="location.href='upi.html'">
  UPI QR
</button>

<button onclick="location.href='udhaar.html'">
  Udhaar
</button>

<button onclick="location.href='reports.html'">
  Reports
</button>

  </div>

</div>

<script src="storage.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
