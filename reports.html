<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Reports</title>

<link rel="stylesheet"
href="style.css">

</head>
<body>

<div class="dashboard">

<div class="top-bar">
<h1>Business Reports</h1>
<p>Daily • Weekly • Monthly • Overall</p>
</div>

<div class="cards">

<div class="card">
<h3>Today's Income</h3>
<h2 id="todayIncomeReport">₹0</h2>
</div>

<div class="card">
<h3>Today's Expense</h3>
<h2 id="todayExpenseReport">₹0</h2>
</div>

<div class="card">
<h3>Weekly Income</h3>
<h2 id="weeklyIncome">₹0</h2>
</div>

<div class="card">
<h3>Weekly Expense</h3>
<h2 id="weeklyExpense">₹0</h2>
</div>

<div class="card">
<h3>Monthly Income</h3>
<h2 id="monthlyIncome">₹0</h2>
</div>

<div class="card">
<h3>Monthly Expense</h3>
<h2 id="monthlyExpense">₹0</h2>
</div>

<div class="card">
<h3>Overall Profit</h3>
<h2 id="overallProfit">₹0</h2>
</div>

<div class="card">
<h3>Business Worth</h3>
<h2 id="businessWorthReport">₹0</h2>
</div>

</div>

</div>

<script src="storage.js"></script>
<script src="reports.js"></script>

</body>
</html>
