<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Income Entry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

  <div class="top-bar">
    <h1>Income Entry</h1>
    <p>Add Daily Income</p>
  </div>

  <div class="card">

    <label>Category</label>
    <select id="incomeCategory">
      <option>Cyber Cafe</option>
      <option>E-Mitra</option>
      <option>Travel</option>
      <option>Banking/AEPS</option>
      <option>Printing</option>
      <option>Other</option>
    </select>

    <br><br>

    <label>Amount</label>
    <input
      type="number"
      id="incomeAmount"
      placeholder="Enter Amount"
    >

    <br><br>

    <button onclick="saveIncome()">
      Save Income
    </button>

  </div>

</div>

<script src="storage.js"></script>
<script src="income.js"></script>

</body>
</html>
